# Vanilla DCGAN baseline on LSUN Church (64x64) — Kaggle dataset
# Baseline for LSGAN vs vanilla GAN comparison
# Dataset: kagglehub.dataset_download("ajaykgp12/lsunchurch")
exp_name: dcgan_lsun_church
dataset: lsun_church_npy
data_root: data/church_outdoor_train_lmdb_color_64.npy
loss: vanilla
optimizer: adam
latent_dim: 1024
batch_size: 64
n_epochs: 30
lr: 0.0002
beta1: 0.5
use_bn: true
num_workers: 2
seed: 42
output_dir: experiments
